apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: go-api-dev
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/abhiiib-builds/go-microservice-gitops-pipeline
    targetRevision: HEAD
    path: gitops/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNameSpace=true
