apiVersion: apps/v1
kind: Deployment

metadata:
  name: go-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: go-api

  template:
    metadata:
      labels:
        app: go-api

    spec:
      containers:
        - name: go-api
          image: go-api:latest

          imagePullPolicy: IfNotPresent

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

          ports:
            - containerPort: 5001

          readinessProbe:
            httpGet:
              path: /ready
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 10
